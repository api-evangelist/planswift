name: PlanSwift
kind: company
description: PlanSwift is Windows desktop takeoff and estimating software for
  construction estimators - turning digital plans (PDF/image/CAD) into measurable,
  countable, exportable material takeoffs and estimates across trades like roofing,
  concrete, earthwork, flooring, and electrical. PlanSwift is owned by
  ConstructConnect. IMPORTANT - PlanSwift does NOT publish a public web/REST API.
  Its developer surface is a desktop extensibility SDK embedded in the Windows
  application - OLE Automation (COM), an internal scripting engine, and a
  plugin/starter-pack model - exposed through a password-gated "Under-The-Hood"
  (U-T-H) tab enabled by contacting ConstructConnect (takeoff@constructconnect.com).
  The public SDK examples on GitHub target PlanSwift9 and are written in Pascal
  (2008) and Visual Basic (2010). There is no documented HTTPS base URL, no API
  keys/OAuth token surface, and no web endpoints to model - this entry is an
  honest stub reflecting a desktop-plugin/COM SDK, not a web API.
